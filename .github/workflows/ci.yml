name: soroban-meter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Build
      run: cargo build --verbose
    - name: Run Tests
      run: cargo test --verbose

  profile_contract:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
    - uses: actions/checkout@v4
    - name: Install soroban-meter-cli
      run: cargo install --path crates/soroban-meter-cli
    
    # In a real pipeline, you would deploy your contract or test against testnet here.
    # We will use the CLI to profile an example contract against testnet.
    - name: Profile Resource Usage
      run: |
        soroban-meter profile \
          --contract CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC \
          --function swap \
          --args '["token_a_address", "token_b_address", "1000"]' \
          --network testnet \
          --output table
